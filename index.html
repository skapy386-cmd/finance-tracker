<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Finance Tracker</title>

<style>
body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tabs button{
padding:10px 15px;
border-radius:8px;
border:none;
background:#22c55e;
color:white;
cursor:pointer;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.inputs{
display:flex;
gap:10px;
flex-wrap:wrap;
}

input,select{
padding:10px;
border-radius:8px;
border:none;
background:#020617;
color:white;
}

button.add{
background:#22c55e;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:#020617;
padding:20px;
border-radius:12px;
text-align:center;
}

.categoryGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.categoryBox{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.categoryRow{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #334155;
}

.table{
margin-top:20px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #334155;
text-align:left;
}

.income{color:#4ade80;}
.expense{color:#f87171;}

.actions button{
background:#334155;
border:none;
padding:6px 10px;
margin-left:5px;
border-radius:6px;
color:white;
cursor:pointer;
}

.status{
margin-top:12px;
font-size:14px;
color:#93c5fd;
}

.status.error{
color:#fca5a5;
}
</style>
</head>
<body>

<div class="container">
<h1>💰 Finance Tracker</h1>

<div class="tabs">
<button onclick="showTab('main')">Операции</button>
<button onclick="showTab('stats')">Статистика</button>
</div>

<div id="mainTab">
<div class="panel">
<div class="inputs">
<select id="month"></select>
<input id="date" type="date">
<select id="type" onchange="updateCategories()">
<option value="income">Доход</option>
<option value="expense">Расход</option>
</select>
<select id="category"></select>
<input id="note" placeholder="Описание">
<input id="amount" type="number" placeholder="Сумма">
<button class="add" onclick="add()">Добавить</button>
</div>
<div id="status" class="status"></div>

<div class="cards">
<div class="card">Доход<h2 id="income">$0</h2></div>
<div class="card">Расход<h2 id="expense">$0</h2></div>
<div class="card">Баланс<h2 id="balance">$0</h2></div>
</div>
</div>

<div class="categoryGrid">
<div class="categoryBox">
<h3>Доходы по категориям</h3>
<div id="incomeStats"></div>
</div>

<div class="categoryBox">
<h3>Расходы по категориям</h3>
<div id="expenseStats"></div>
</div>
</div>

<div class="table">
<table>
<thead>
<tr>
<th>Дата</th>
<th>Категория</th>
<th>Описание</th>
<th>Тип</th>
<th>Сумма</th>
<th>Действия</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>
</div>

<div id="statsTab" style="display:none">
<div class="table">
<h2>Статистика по месяцам</h2>
<table>
<thead>
<tr>
<th>Месяц</th>
<th>Доход</th>
<th>Расход</th>
<th>Результат</th>
</tr>
</thead>
<tbody id="statsTable"></tbody>
</table>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://mhssctiyqzvycoyganct.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oc3NjdGl5cXp2eWNveWdhbmN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NDM4MTMsImV4cCI6MjA4ODMxOTgxM30.xOriQ-w57-67992R9CUkxEYnyCDJkgzUCOMWFwDxXLo";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let data = [];
let editId = null;

const incomeCats=["💼 Работа","₿ Крипта","🎰 Лудка","📢 Реклама","🤝 Партнерки"];
const expenseCats=["🍔 Продукты","🚗 Транспорт","🎮 Развлечения","📚 Образование","📦 Другое"];

function setStatus(message, isError = false){
const status = document.getElementById("status");
status.textContent = message;
status.className = isError ? "status error" : "status";
}

function updateCategories(){
const type = document.getElementById("type").value;
const select = document.getElementById("category");
select.innerHTML = "";
const cats = type === "income" ? incomeCats : expenseCats;
cats.forEach(c=>{
const o = document.createElement("option");
o.value = c;
o.textContent = c;
select.appendChild(o);
});
}

function monthNow(){
const d = new Date();
return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}

function transactionMonth(transactionDate){
const d = new Date(transactionDate);
return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}

function availableMonths(){
const months = new Set(data.map(t => transactionMonth(t.date)));
months.add(monthNow());
return Array.from(months).sort();
}

function loadMonths(){
const select = document.getElementById("month");
const months = availableMonths();
select.innerHTML = "";
months.forEach(m=>{
const o = document.createElement("option");
o.value = m;
o.textContent = m;
select.appendChild(o);
});

if (months.includes(monthNow())) {
select.value = monthNow();
}

document.getElementById("date").value = new Date().toISOString().split("T")[0];
updateCategories();
render();
}

async function fetchTransactions(){
setStatus("Загрузка данных из Supabase...");
const { data: rows, error } = await supabase
.from("transactions")
.select("id, date, type, category, note, amount")
.order("date", { ascending: false });

if(error){
setStatus(`Ошибка загрузки: ${error.message}`, true);
return;
}

data = rows || [];
loadMonths();
setStatus("Данные синхронизированы с Supabase");
}

async function add(){
const type = document.getElementById("type").value;
const category = document.getElementById("category").value;
const note = document.getElementById("note").value;
const amount = parseFloat(document.getElementById("amount").value);
const date = document.getElementById("date").value;

if(!amount || !date){
setStatus("Укажите сумму и дату", true);
return;
}

const payload = { type, category, note, amount, date };

if(editId !== null){
const { error } = await supabase.from("transactions").update(payload).eq("id", editId);
if(error){
setStatus(`Ошибка обновления: ${error.message}`, true);
return;
}
editId = null;
setStatus("Операция обновлена");
}else{
const { error } = await supabase.from("transactions").insert(payload);
if(error){
setStatus(`Ошибка добавления: ${error.message}`, true);
return;
}
setStatus("Операция добавлена");
}

document.getElementById("amount").value = "";
document.getElementById("note").value = "";
await fetchTransactions();
}

function edit(id){
const t = data.find(item => item.id === id);
if(!t) return;
document.getElementById("type").value = t.type;
updateCategories();
document.getElementById("category").value = t.category;
document.getElementById("note").value = t.note || "";
document.getElementById("amount").value = t.amount;
document.getElementById("date").value = t.date;
editId = id;
setStatus("Режим редактирования включен");
}

async function removeTransaction(id){
const { error } = await supabase.from("transactions").delete().eq("id", id);
if(error){
setStatus(`Ошибка удаления: ${error.message}`, true);
return;
}
setStatus("Операция удалена");
await fetchTransactions();
}

function render(){
const selectedMonth = document.getElementById("month").value;
let income = 0;
let expense = 0;
const incomeCatsStats = {};
const expenseCatsStats = {};
const list = document.getElementById("list");

list.innerHTML = "";

const filtered = data.filter(t => transactionMonth(t.date) === selectedMonth);

filtered.forEach((t)=>{
const tr = document.createElement("tr");

if(t.type === "income"){
income += Number(t.amount);
incomeCatsStats[t.category] = (incomeCatsStats[t.category] || 0) + Number(t.amount);
}else{
expense += Number(t.amount);
expenseCatsStats[t.category] = (expenseCatsStats[t.category] || 0) + Number(t.amount);
}

tr.innerHTML = `
<td>${formatDate(t.date)}</td>
<td>${t.category}</td>
<td>${t.note || ""}</td>
<td class="${t.type}">${t.type === "income" ? "доход" : "расход"}</td>
<td class="${t.type}">$${t.amount}</td>
<td class="actions">
<button onclick="edit(${t.id})">✏</button>
<button onclick="removeTransaction(${t.id})">🗑</button>
</td>`;

list.appendChild(tr);
});

document.getElementById("income").textContent = "$" + income;
document.getElementById("expense").textContent = "$" + expense;
document.getElementById("balance").textContent = "$" + (income - expense);

drawStats("incomeStats", incomeCatsStats);
drawStats("expenseStats", expenseCatsStats);
}

function drawStats(id, cats){
const stats = document.getElementById(id);
stats.innerHTML = "";
Object.entries(cats).forEach(([cat, sum])=>{
const div = document.createElement("div");
div.className = "categoryRow";
div.innerHTML = `<span>${cat}</span><span>$${sum}</span>`;
stats.appendChild(div);
});
}

function renderStats(){
const table = document.getElementById("statsTable");
table.innerHTML = "";
const months = availableMonths();

months.forEach(month=>{
let income = 0;
let expense = 0;

data.forEach(t=>{
if(transactionMonth(t.date) !== month) return;
if(t.type === "income") income += Number(t.amount);
else expense += Number(t.amount);
});

const result = income - expense;
const tr = document.createElement("tr");
tr.innerHTML = `
<td>${month}</td>
<td class="income">$${income}</td>
<td class="expense">$${expense}</td>
<td>${result >= 0 ? "+$" + result : "-$" + Math.abs(result)}</td>`;

table.appendChild(tr);
});
}

function showTab(tab){
document.getElementById("mainTab").style.display = tab === "main" ? "block" : "none";
document.getElementById("statsTab").style.display = tab === "stats" ? "block" : "none";
if(tab === "stats") renderStats();
}

function formatDate(date){
if(!date) return "";
const d = new Date(date);
const months = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
return d.getDate() + " " + months[d.getMonth()];
}

document.getElementById("month").addEventListener("change", render);
fetchTransactions();
</script>

<!--
Supabase SQL (выполнить в SQL Editor):
create table if not exists public.transactions (
  id bigint generated always as identity primary key,
  date date not null,
  type text not null check (type in ('income','expense')),
  category text not null,
  note text,
  amount numeric not null check (amount > 0),
  created_at timestamptz default now()
);

alter table public.transactions enable row level security;

create policy "Allow anon full access for demo"
on public.transactions
for all
to anon
using (true)
with check (true);
-->
</body>
</html>
