<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Finance Tracker</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tabs button{
padding:10px 15px;
border-radius:8px;
border:none;
background:#22c55e;
color:white;
cursor:pointer;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.inputs{
display:flex;
gap:10px;
flex-wrap:wrap;
}

input,select{
padding:10px;
border-radius:8px;
border:none;
background:#020617;
color:white;
}

button.add{
background:#22c55e;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:#020617;
padding:20px;
border-radius:12px;
text-align:center;
}

.categoryGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.categoryBox{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.categoryRow{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #334155;
}

.table{
margin-top:20px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #334155;
text-align:left;
}

.income{color:#4ade80;}
.expense{color:#f87171;}

.actions button{
background:#334155;
border:none;
padding:6px 10px;
margin-left:5px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>

</head>
<script src="script.js"></script>
<body>

<div class="container">

<h1>💰 Finance Tracker</h1>

<div class="tabs">
<button onclick="showTab('main')">Операции</button>
<button onclick="showTab('stats')">Статистика</button>
</div>

<div id="mainTab">

<div class="panel">

<div class="inputs">

<select id="month"></select>

<input id="date" type="date">

<select id="type" onchange="updateCategories()">
<option value="income">Доход</option>
<option value="expense">Расход</option>
</select>

<select id="category"></select>

<input id="note" placeholder="Описание">

<input id="amount" type="number" placeholder="Сумма">

<button class="add" onclick="add()">Добавить</button>

</div>

<div class="cards">

<div class="card">
Доход
<h2 id="income">$0</h2>
</div>

<div class="card">
Расход
<h2 id="expense">$0</h2>
</div>

<div class="card">
Баланс
<h2 id="balance">$0</h2>
</div>

</div>

</div>

<div class="categoryGrid">

<div class="categoryBox">
<h3>Доходы по категориям</h3>
<div id="incomeStats"></div>
</div>

<div class="categoryBox">
<h3>Расходы по категориям</h3>
<div id="expenseStats"></div>
</div>

</div>

<div class="table">

<table>

<thead>
<tr>
<th>Дата</th>
<th>Категория</th>
<th>Описание</th>
<th>Тип</th>
<th>Сумма</th>
<th>Действия</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>

</div>

<div id="statsTab" style="display:none">

<div class="table">

<h2>Статистика по месяцам</h2>

<table>

<thead>
<tr>
<th>Месяц</th>
<th>Доход</th>
<th>Расход</th>
<th>Результат</th>
</tr>
</thead>

<tbody id="statsTable"></tbody>

</table>

</div>

</div>

</div>

<script>

let data=JSON.parse(localStorage.getItem("finance"))||{}
let editIndex=null

const incomeCats=[
"💼 Работа",
"₿ Крипта",
"🎰 Лудка",
"📢 Реклама",
"🤝 Партнерки"
]

const expenseCats=[
"🍔 Продукты",
"🚗 Транспорт",
"🎮 Развлечения",
"📚 Образование",
"📦 Другое"
]

function updateCategories(){

let type=document.getElementById("type").value
let select=document.getElementById("category")

select.innerHTML=""

let cats= type==="income" ? incomeCats : expenseCats

cats.forEach(c=>{
let o=document.createElement("option")
o.value=c
o.textContent=c
select.appendChild(o)
})

}

function monthNow(){
let d=new Date()
return d.getFullYear()+"-"+(d.getMonth()+1)
}

function loadMonths(){

let select=document.getElementById("month")

if(!data[monthNow()])
data[monthNow()]=[]

select.innerHTML=""

Object.keys(data).forEach(m=>{
let o=document.createElement("option")
o.value=m
o.textContent=m
select.appendChild(o)
})

select.value=monthNow()

document.getElementById("date").value=new Date().toISOString().split("T")[0]

updateCategories()
render()

}

function add(){

let m=document.getElementById("month").value
let type=document.getElementById("type").value
let cat=document.getElementById("category").value
let note=document.getElementById("note").value
let amount=parseFloat(document.getElementById("amount").value)
let date=document.getElementById("date").value

if(!amount)return

if(!data[m])data[m]=[]

if(editIndex!==null){
data[m][editIndex]={type,cat,note,amount,date}
editIndex=null
}else{
data[m].unshift({type,cat,note,amount,date})
}

localStorage.setItem("finance",JSON.stringify(data))

document.getElementById("amount").value=""
document.getElementById("note").value=""

render()

}

function edit(i){

let m=document.getElementById("month").value
let t=data[m][i]

document.getElementById("type").value=t.type
updateCategories()

document.getElementById("category").value=t.cat
document.getElementById("note").value=t.note
document.getElementById("amount").value=t.amount
document.getElementById("date").value=t.date

editIndex=i

}

function remove(i){

let m=document.getElementById("month").value

data[m].splice(i,1)

localStorage.setItem("finance",JSON.stringify(data))

render()

}

function render(){

let m=document.getElementById("month").value

let income=0
let expense=0

let incomeCatsStats={}
let expenseCatsStats={}

let list=document.getElementById("list")

list.innerHTML=""

;(data[m]||[]).forEach((t,i)=>{

let tr=document.createElement("tr")

if(t.type==="income"){
income+=t.amount
incomeCatsStats[t.cat]=(incomeCatsStats[t.cat]||0)+t.amount
}else{
expense+=t.amount
expenseCatsStats[t.cat]=(expenseCatsStats[t.cat]||0)+t.amount
}

tr.innerHTML=`

<td>${formatDate(t.date)}</td>
<td>${t.cat}</td>
<td>${t.note || ""}</td>
<td class="${t.type}">${t.type==="income"?"доход":"расход"}</td>
<td class="${t.type}">$${t.amount}</td>

<td class="actions">
<button onclick="edit(${i})">✏</button>
<button onclick="remove(${i})">🗑</button>
</td>

`

list.appendChild(tr)

})

document.getElementById("income").textContent="$"+income
document.getElementById("expense").textContent="$"+expense
document.getElementById("balance").textContent="$"+(income-expense)

drawStats("incomeStats",incomeCatsStats)
drawStats("expenseStats",expenseCatsStats)

}

function drawStats(id,cats){

let stats=document.getElementById(id)

stats.innerHTML=""

Object.entries(cats).forEach(([cat,sum])=>{

let div=document.createElement("div")

div.className="categoryRow"

div.innerHTML=`
<span>${cat}</span>
<span>$${sum}</span>
`

stats.appendChild(div)

})

}

function renderStats(){

let table=document.getElementById("statsTable")

table.innerHTML=""

Object.keys(data).forEach(month=>{

let income=0
let expense=0

data[month].forEach(t=>{
if(t.type==="income") income+=t.amount
else expense+=t.amount
})

let result=income-expense

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${month}</td>
<td class="income">$${income}</td>
<td class="expense">$${expense}</td>
<td>${result>=0?"+$"+result:"-$"+Math.abs(result)}</td>

`

table.appendChild(tr)

})

}

function showTab(tab){

document.getElementById("mainTab").style.display=tab==="main"?"block":"none"
document.getElementById("statsTab").style.display=tab==="stats"?"block":"none"

if(tab==="stats"){
renderStats()
}

}

function formatDate(date){

if(!date)return ""

let d=new Date(date)

let months=[
"января","февраля","марта","апреля","мая","июня",
"июля","августа","сентября","октября","ноября","декабря"
]

return d.getDate()+" "+months[d.getMonth()]

}

document.getElementById("month").addEventListener("change",render)

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

<script>
loadMonths();
</script>

</body>
</html>
